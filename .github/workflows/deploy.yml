name: Validate and Deploy Worker

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-hey-run-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker
        run: npm run check

  deploy:
    name: Deploy to Cloudflare
    if: github.event_name != 'pull_request' && github.repository_owner == 'hello-yunshu'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production
      url: https://github.hey.run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          