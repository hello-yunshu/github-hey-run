name: Validate and Deploy Worker

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-hey-run-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker
        run: npm run check

  deploy:
    name: Deploy to Cloudflare
    if: github.event_name != 'pull_request' && github.repository_owner == 'hello-yunshu'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production
      url: https://github.hey.run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployed Worker
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://github.hey.run"

          echo "Checking health endpoint..."
          HEALTH="$(
            curl \
              --fail \
              --silent \
              --show-error \
              --retry 12 \
              --retry-delay 5 \
              --retry-all-errors \
              "${BASE_URL}/healthz"
          )"

          if [[ "${HEALTH}" != "ok" ]]; then
            echo "Unexpected health response: ${HEALTH}"
            exit 1
          fi

          echo "Checking blocked GitHub owner..."
          BLOCKED_STATUS="$(
            curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out '%{http_code}' \
              "${BASE_URL}/openai/openai-python/archive/refs/heads/main.zip"
          )"

          if [[ "${BLOCKED_STATUS}" != "404" ]]; then
            echo "Expected blocked owner to return 404, got ${BLOCKED_STATUS}"
            exit 1
          fi

          echo "Checking allowed Raw file..."
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 3 \
            --retry-all-errors \
            --output /dev/null \
            "${BASE_URL}/hello-yunshu/Xray_bash_onekey/raw/refs/heads/main/install.sh"

          echo "Checking Git read access..."
          GIT_TERMINAL_PROMPT=0 timeout 90 \
            git ls-remote \
            "${BASE_URL}/hello-yunshu/mira-mouse.git" \
            HEAD |
            grep -Eq '^[0-9a-f]{40}[[:space:]]+HEAD$'

          echo "Deployment verification passed."